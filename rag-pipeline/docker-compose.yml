name: dental-rag

# Ollama is expected to run on the host machine (localhost:11434).
# Start it with `ollama serve` and pull required models, e.g.:
#   ollama pull llama3:8b
#   ollama pull nomic-embed-text

services:
  chroma:
    image: chromadb/chroma:latest
    container_name: rag-chroma
    ports:
      - "8000:8000"
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    volumes:
      - chroma-data:/data
    # Note: the chromadb/chroma image is minimal and ships without wget/curl/
    # python, so an HTTP healthcheck inside the container isn't practical.
    # We rely on `service_started` from dependents instead.
    restart: unless-stopped

  rag-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: dental-rag-app:latest
    container_name: rag-app
    ports:
      - "3000:3000"
    environment:
      # Ollama runs on the host machine. `host.docker.internal` resolves to the
      # host from within the container (works on Docker Desktop and, thanks to
      # extra_hosts below, on Linux too).
      OLLAMA_URL: ${OLLAMA_URL:-http://0.0.0.0:11434}
      CHROMA_URL: http://chroma:8000
      LLM_MODEL: ${LLM_MODEL:-llama3:8b}
      EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
      PORT: "3000"
      TOP_K: "8"
      RERANK: "false"
     
    volumes:
      # Sample / user-supplied documents are read-only inside the container.
      - ./data:/app/data:ro
    depends_on:
      chroma:
        condition: service_started
    restart: unless-stopped

volumes:
  chroma-data:
